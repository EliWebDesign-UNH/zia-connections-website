<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Zia Connections: classic NM Zia sun, modified for "connections" theme -->
  <!-- Rays extend outward and terminate in small nodes/dots (network endpoints) -->
  <!-- Thin connecting lines link adjacent nodes (the network) -->
  <defs>
    <linearGradient id="ziaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f7931e"/>
    </linearGradient>
  </defs>

  <g transform="translate(100,100)">
    <!-- Central circle -->
    <circle r="14" fill="url(#ziaGrad)"/>

    <!-- 8 rays as line segments from center to nodes (4 cardinal + 4 diagonal) -->
    <!-- Cardinal rays -->
    <line x1="0" y1="0" x2="0" y2="-80" stroke="url(#ziaGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="80" y2="0" stroke="url(#ziaGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="80" stroke="url(#ziaGrad)" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-80" y2="0" stroke="url(#ziaGrad)" stroke-width="3" stroke-linecap="round"/>

    <!-- Diagonal rays (shorter, with low opacity, suggest interconnection) -->
    <line x1="0" y1="0" x2="56.6" y2="-56.6" stroke="url(#ziaGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="56.6" y2="56.6" stroke="url(#ziaGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="-56.6" y2="56.6" stroke="url(#ziaGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    <line x1="0" y1="0" x2="-56.6" y2="-56.6" stroke="url(#ziaGrad)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>

    <!-- Node endpoints (circles at the tip of each cardinal ray) -->
    <circle cx="0" cy="-80" r="6" fill="#ff6b35"/>
    <circle cx="80" cy="0" r="6" fill="#ff6b35"/>
    <circle cx="0" cy="80" r="6" fill="#ff6b35"/>
    <circle cx="-80" cy="0" r="6" fill="#ff6b35"/>

    <!-- Smaller nodes at diagonal ray tips -->
    <circle cx="56.6" cy="-56.6" r="4" fill="#f7931e" opacity="0.7"/>
    <circle cx="56.6" cy="56.6" r="4" fill="#f7931e" opacity="0.7"/>
    <circle cx="-56.6" cy="56.6" r="4" fill="#f7931e" opacity="0.7"/>
    <circle cx="-56.6" cy="-56.6" r="4" fill="#f7931e" opacity="0.7"/>

    <!-- Connection lines between adjacent cardinal nodes (the "network" overlay) -->
    <g stroke="#ff6b35" stroke-width="1.5" opacity="0.4" stroke-dasharray="3,2" fill="none">
      <!-- Top to right -->
      <line x1="0" y1="-80" x2="80" y2="0"/>
      <!-- Right to bottom -->
      <line x1="80" y1="0" x2="0" y2="80"/>
      <!-- Bottom to left -->
      <line x1="0" y1="80" x2="-80" y2="0"/>
      <!-- Left to top -->
      <line x1="-80" y1="0" x2="0" y2="-80"/>
    </g>
  </g>
</svg>
