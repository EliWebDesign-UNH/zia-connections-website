<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Zia Connections: more traditional Zia sun, with subtle connection lines between ray tips -->
  <defs>
    <linearGradient id="ziaGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#f7931e"/>
    </linearGradient>
  </defs>

  <g transform="translate(100,100)">
    <!-- Central circle (the Zia "core") -->
    <circle r="12" fill="url(#ziaGrad)"/>

    <!-- 4 cardinal rays: equal length, equal weight, traditional Zia style -->
    <line x1="0" y1="0" x2="0" y2="-78" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="78" y2="0" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="78" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-78" y2="0" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>

    <!-- 4 diagonal rays: equal length, equal weight, traditional Zia style -->
    <line x1="0" y1="0" x2="55.15" y2="-55.15" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="55.15" y2="55.15" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-55.15" y2="55.15" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-55.15" y2="-55.15" stroke="url(#ziaGrad)" stroke-width="4" stroke-linecap="round"/>

    <!-- Subtle "connections" overlay: light dashed lines between adjacent ray tips -->
    <!-- This is the connectedness theme — the network that links the rays -->
    <g stroke="#ff6b35" stroke-width="1.25" opacity="0.35" stroke-dasharray="3,3" fill="none">
      <!-- Cardinal-to-cardinal connections (the square) -->
      <line x1="0" y1="-78" x2="78" y2="0"/>
      <line x1="78" y1="0" x2="0" y2="78"/>
      <line x1="0" y1="78" x2="-78" y2="0"/>
      <line x1="-78" y1="0" x2="0" y2="-78"/>
      <!-- Cardinal-to-diagonal connections (the web) -->
      <line x1="0" y1="-78" x2="55.15" y2="-55.15"/>
      <line x1="55.15" y1="-55.15" x2="78" y2="0"/>
      <line x1="78" y1="0" x2="55.15" y2="55.15"/>
      <line x1="55.15" y1="55.15" x2="0" y2="78"/>
      <line x1="0" y1="78" x2="-55.15" y2="55.15"/>
      <line x1="-55.15" y1="55.15" x2="-78" y2="0"/>
      <line x1="-78" y1="0" x2="-55.15" y2="-55.15"/>
      <line x1="-55.15" y1="-55.15" x2="0" y2="-78"/>
    </g>
  </g>
</svg>
