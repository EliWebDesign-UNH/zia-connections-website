<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Zia Connections v6: each side has 4 lines, with the inner 2 being longer than the outer 2 -->
  <!-- The rays fan out from the center (wider base) and tighten toward the tips (narrower) -->
  <!-- This creates a subtle "spreading" effect at the center, like the rays emerge from a single point -->

  <g transform="translate(100,100)">
    <!-- Outer thick ring -->
    <circle cx="0" cy="0" r="92" fill="none" stroke="#a02828" stroke-width="6"/>

    <!-- Hollow white center circle (slightly larger to accommodate the fanning lines) -->
    <circle cx="0" cy="0" r="11" fill="#ffffff" stroke="#a02828" stroke-width="4"/>

    <!-- TOP: 4 lines, with inner 2 longer than outer 2 -->
    <!-- Inner 2 (the long ones): start near the center disk, extend almost to the outer ring -->
    <line x1="-3" y1="-12" x2="-3" y2="-78" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="3"  y1="-12" x2="3"  y2="-78" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <!-- Outer 2 (the short ones): start near the center disk, but end earlier (tapered tips) -->
    <line x1="-12" y1="-12" x2="-12" y2="-58" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="12"  y1="-12" x2="12"  y2="-58" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>

    <!-- BOTTOM: 4 lines, inner 2 longer than outer 2 (mirror of top) -->
    <line x1="-3" y1="12" x2="-3" y2="78" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="3"  y1="12" x2="3"  y2="78" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="-12" y1="12" x2="-12" y2="58" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="12"  y1="12" x2="12"  y2="58" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>

    <!-- LEFT: 4 lines, inner 2 longer than outer 2 -->
    <line x1="-12" y1="-3" x2="-78" y2="-3" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="-12" y1="3"  x2="-78" y2="3"  stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="-12" y1="-12" x2="-58" y2="-12" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="-12" y1="12"  x2="-58" y2="12"  stroke="#a02828" stroke-width="5" stroke-linecap="round"/>

    <!-- RIGHT: 4 lines, inner 2 longer than outer 2 -->
    <line x1="12" y1="-3" x2="78" y2="-3" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="12" y1="3"  x2="78" y2="3"  stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="12" y1="-12" x2="58" y2="-12" stroke="#a02828" stroke-width="5" stroke-linecap="round"/>
    <line x1="12" y1="12"  x2="58" y2="12"  stroke="#a02828" stroke-width="5" stroke-linecap="round"/>

    <!-- 4 quadrants, 3 simple arcs each (globe-longitude style) -->
    <g fill="none" stroke="#a02828" stroke-width="3" stroke-linecap="round">
      <!-- TOP-RIGHT quadrant -->
      <path d="M 12,-58 Q 50,-50 58,-12"/>
      <path d="M -12,-58 Q 30,-30 58,12"/>
      <path d="M 12,-58 Q 35,-25 58,-12" opacity="0.85"/>

      <!-- BOTTOM-RIGHT quadrant -->
      <path d="M 12,58 Q 50,50 58,12"/>
      <path d="M -12,58 Q 30,30 58,-12"/>
      <path d="M 12,58 Q 35,25 58,12" opacity="0.85"/>

      <!-- BOTTOM-LEFT quadrant -->
      <path d="M -12,58 Q -50,50 -58,12"/>
      <path d="M 12,58 Q -30,30 -58,-12"/>
      <path d="M -12,58 Q -35,25 -58,12" opacity="0.85"/>

      <!-- TOP-LEFT quadrant -->
      <path d="M -12,-58 Q -50,-50 -58,-12"/>
      <path d="M 12,-58 Q -30,-30 -58,12"/>
      <path d="M -12,-58 Q -35,-25 -58,-12" opacity="0.85"/>
    </g>
  </g>
</svg>
