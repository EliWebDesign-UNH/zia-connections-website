<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Zia Connections: matches reference design -->
  <!-- - Thick outer ring (red) -->
  <!-- - HOLLOW white center circle (negative space, not filled) -->
  <!-- - 10 lines from center area to outer ring: -->
  <!--   - Top: 2 vertical lines -->
  <!--   - Bottom: 2 vertical lines -->
  <!--   - Left: 3 horizontal lines -->
  <!--   - Right: 3 horizontal lines -->
  <!-- - 4 quadrant globe/lattice patterns (curved meridian + parallel lines like a globe's grid) -->
  <!-- - Color: brick red / firebrick (#a02828) -->

  <g transform="translate(100,100)">
    <!-- Thick outer ring (frame) -->
    <circle cx="0" cy="0" r="92" fill="none" stroke="#a02828" stroke-width="6"/>

    <!-- Hollow white center circle (negative space) -->
    <circle cx="0" cy="0" r="12" fill="#ffffff" stroke="#a02828" stroke-width="4"/>

    <!-- 4 cardinal rays: top (2 vertical lines) -->
    <line x1="-7" y1="-13" x2="-7" y2="-80" stroke="#a02828" stroke-width="6" stroke-linecap="round"/>
    <line x1="7"  y1="-13" x2="7"  y2="-80" stroke="#a02828" stroke-width="6" stroke-linecap="round"/>

    <!-- 4 cardinal rays: bottom (2 vertical lines) -->
    <line x1="-7" y1="13" x2="-7" y2="80" stroke="#a02828" stroke-width="6" stroke-linecap="round"/>
    <line x1="7"  y1="13" x2="7"  y2="80" stroke="#a02828" stroke-width="6" stroke-linecap="round"/>

    <!-- 4 cardinal rays: left (3 horizontal lines) -->
    <line x1="-13" y1="-10" x2="-80" y2="-10" stroke="#a02828" stroke-width="6" stroke-linecap="round"/>
    <line x1="-13" y1="0"   x2="-80" y2="0"   stroke="#a02828" stroke-width="6" stroke-linecap="round"/>
    <line x1="-13" y1="10"  x2="-80" y2="10"  stroke="#a02828" stroke-width="6" stroke-linecap="round"/>

    <!-- 4 cardinal rays: right (3 horizontal lines) -->
    <line x1="13" y1="-10" x2="80" y2="-10" stroke="#a02828" stroke-width="6" stroke-linecap="round"/>
    <line x1="13" y1="0"   x2="80" y2="0"   stroke="#a02828" stroke-width="6" stroke-linecap="round"/>
    <line x1="13" y1="10"  x2="80" y2="10"  stroke="#a02828" stroke-width="6" stroke-linecap="round"/>

    <!-- 4 quadrant globe/lattice patterns: curved meridian + parallel lines, like a globe's grid -->
    <!-- Top-right quadrant -->
    <g fill="none" stroke="#a02828" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <!-- Arcs: parallels (latitudes) curving between top and right rays -->
      <path d="M 7,-80 Q 50,-50 80,-10"/>
      <path d="M 7,-80 Q 30,-40 80,10" opacity="0.7"/>
      <!-- Meridian: longer curve going from outer ring toward center -->
      <path d="M 7,-80 Q 60,-30 80,-10"/>
    </g>

    <!-- Bottom-right quadrant -->
    <g fill="none" stroke="#a02828" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <path d="M 7,80 Q 50,50 80,10"/>
      <path d="M 7,80 Q 30,40 80,-10" opacity="0.7"/>
      <path d="M 7,80 Q 60,30 80,10"/>
    </g>

    <!-- Bottom-left quadrant -->
    <g fill="none" stroke="#a02828" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <path d="M -7,80 Q -50,50 -80,10"/>
      <path d="M -7,80 Q -30,40 -80,-10" opacity="0.7"/>
      <path d="M -7,80 Q -60,30 -80,10"/>
    </g>

    <!-- Top-left quadrant -->
    <g fill="none" stroke="#a02828" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <path d="M -7,-80 Q -50,-50 -80,-10"/>
      <path d="M -7,-80 Q -30,-40 -80,10" opacity="0.7"/>
      <path d="M -7,-80 Q -60,-30 -80,-10"/>
    </g>
  </g>
</svg>
