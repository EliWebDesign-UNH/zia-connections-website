<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Zia Connections: traditional Zia with circle frame, 4 cardinal rays (3 lines each), quadrant connectors -->
  <!-- All in terracotta/burgundy red on transparent background -->

  <g transform="translate(100,100)">
    <!-- Outer circle (frame) -->
    <circle cx="0" cy="0" r="92" fill="none" stroke="#a02820" stroke-width="6"/>

    <!-- Solid center disk (the "sun" / hub) -->
    <circle cx="0" cy="0" r="14" fill="#a02820"/>

    <!-- 4 cardinal rays: 3 parallel lines each, from center toward edge of frame -->
    <!-- Top ray (3 vertical lines) -->
    <line x1="-12" y1="0" x2="-12" y2="-78" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="0"   y1="0" x2="0"   y2="-78" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="12"  y1="0" x2="12"  y2="-78" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>

    <!-- Right ray (3 horizontal lines) -->
    <line x1="0" y1="-12" x2="78" y2="-12" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0"   x2="78" y2="0"   stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="12"  x2="78" y2="12"  stroke="#a02820" stroke-width="5" stroke-linecap="round"/>

    <!-- Bottom ray (3 vertical lines) -->
    <line x1="-12" y1="0" x2="-12" y2="78" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="0"   y1="0" x2="0"   y2="78" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="12"  y1="0" x2="12"  y2="78" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>

    <!-- Left ray (3 horizontal lines) -->
    <line x1="0" y1="-12" x2="-78" y2="-12" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="0"   x2="-78" y2="0"   stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <line x1="0" y1="12"  x2="-78" y2="12"  stroke="#a02820" stroke-width="5" stroke-linecap="round"/>

    <!-- 4 curved quadrant bands: connect the tips of adjacent rays, creating the "woven" feel -->
    <!-- These are arc segments going around the corners of the design -->
    <!-- Top-right quadrant: connects top-ray tips to right-ray tips -->
    <path d="M 12,-78 Q 60,-60 78,-12" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <path d="M -12,-78 Q 60,-60 78,12" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 12,-78 Q 60,-30 78,12" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

    <!-- Bottom-right quadrant: right-ray to bottom-ray -->
    <path d="M 78,12 Q 60,60 12,78" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <path d="M 78,-12 Q 60,60 -12,78" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M 78,12 Q 60,30 12,78" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

    <!-- Bottom-left quadrant: bottom to left -->
    <path d="M -12,78 Q -60,60 -78,12" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <path d="M 12,78 Q -60,60 -78,-12" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M -12,78 Q -60,30 -78,12" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>

    <!-- Top-left quadrant: left to top -->
    <path d="M -78,-12 Q -60,-60 -12,-78" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round"/>
    <path d="M -78,12 Q -60,-60 12,-78" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
    <path d="M -78,-12 Q -60,-30 -12,-78" fill="none" stroke="#a02820" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
